name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  html-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install HTMLHint
        run: npm install -g htmlhint
      - name: Lint HTML files
        run: htmlhint "**/*.html" --ignore "node_modules/**"
